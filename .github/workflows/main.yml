name: CI-CD

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: lamacop/frontend
        run: npm run build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: lamacop/backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate backend imports
        working-directory: lamacop/backend
        run: python -c "from app.main import app; print(app.title)"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/lamacop-frontend:latest

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/lamacop-backend:latest

      - name: Deploy to Azure VM via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          password: ${{ secrets.AZURE_VM_PASSWORD }}
          script: |
            docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }}
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/lamacop-frontend:latest
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/lamacop-backend:latest
            docker rm -f lamacop-frontend || true
            docker rm -f lamacop-backend || true
            docker network create lamacop-net || true
            docker run -d --name lamacop-backend --network lamacop-net -p 8000:8000 --env-file /opt/lamacop/backend.env ${{ secrets.DOCKERHUB_USERNAME }}/lamacop-backend:latest
            docker run -d --name lamacop-frontend --network lamacop-net -p 3000:3000 --env-file /opt/lamacop/frontend.env ${{ secrets.DOCKERHUB_USERNAME }}/lamacop-frontend:latest
