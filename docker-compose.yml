services:
  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lamacop-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.example
    ports:
      - "8000:8000"
    environment:
      FRONTEND_URL: http://20.111.60.184
    networks:
      - lamacop-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lamacop-frontend
    restart: unless-stopped
    env_file:
      - ./backend/.env.example
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - lamacop-network

networks:
  lamacop-network:
    driver: bridge
