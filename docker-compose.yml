services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: lamacop-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-lamacop}
      MYSQL_USER: ${MYSQL_USER:-lamacop_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-lamacop_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/mysql-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - lamacop-network

  # FastAPI Backend
  backend:
    image: raedaffes/lamacop-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lamacop-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-lamacop}
      DB_USER: ${DB_USER:-lamacop_user}
      DB_PASSWORD: ${DB_PASSWORD:-lamacop_password}
      FRONTEND_URL: ${FRONTEND_URL:-http://20.111.60.184}
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - lamacop-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  # Next.js Frontend
  frontend:
    image: raedaffes/lamacop-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile

      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://20.111.60.184:8000/api/v1}
    container_name: lamacop-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - lamacop-network

networks:
  lamacop-network:
    driver: bridge

volumes:
  mysql-data:
