services:
  # FastAPI Backend
  backend:
    image: raedaffes/lamacop-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lamacop-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      FRONTEND_URL: ${FRONTEND_URL:-http://20.111.60.184}
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - lamacop-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  # Next.js Frontend
  frontend:
    image: raedaffes/lamacop-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile

      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://20.111.60.184:8000/api/v1}
    container_name: lamacop-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - lamacop-network

networks:
  lamacop-network:
    driver: bridge
