services:
  # MySQL Database
  mysql:
    image: mysql:latest
    container_name: lamacop-mysql
    restart: unless-stopped
    env_file:
      - ./backend/.env.example
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - lamacop-network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lamacop-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.example
    ports:
      - "8000:8000"
    environment:
      DB_HOST: mysql
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - lamacop-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lamacop-frontend
    restart: unless-stopped
    env_file:
      - ./backend/.env.example
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - lamacop-network

volumes:
  mysql_data:
    driver: local

networks:
  lamacop-network:
    driver: bridge
